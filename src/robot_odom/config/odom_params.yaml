# Encoder odometry parameters
# Adjust GPIO pins to match your encoder wiring.
# Each encoder has two channels: A (pulse) and B (direction).
# If using single-phase encoders, set single_phase: true and B pins are ignored.

odom_node:
  ros__parameters:
    gpio_chip: "/dev/gpiochip4"

    # Encoder GPIO pins (BCM numbering)
    # These defaults assume you've wired encoders to available GPIO pins.
    # Change to match your actual wiring.
    encoder_fl_a: 2
    encoder_fl_b: 3
    encoder_fr_a: 4
    encoder_fr_b: 14
    encoder_rl_a: 15
    encoder_rl_b: 18
    encoder_rr_a: 7
    encoder_rr_b: 8

    # Set true if your encoders have only one output channel
    single_phase: false

    # Encoder PPR (pulses per revolution) on the motor shaft
    # Common values: 7, 11, 13 for small DC gearmotor encoders
    counts_per_rev: 11

    # Gear ratio: how many motor shaft turns per one wheel turn
    # e.g., 30:1 gearbox → gear_ratio = 30.0
    gear_ratio: 30.0

    # Robot geometry (must match driver_params.yaml)
    wheel_radius: 0.033
    track_width: 0.23

    # Odometry publish rate (Hz)
    odom_frequency: 50.0

    # Frame IDs
    odom_frame: "odom"
    base_frame: "base_link"

    # Pose covariance diagonal [x, y, z, roll, pitch, yaw]
    # These are initial estimates; tune based on real-world testing.
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]

    # Twist covariance diagonal [vx, vy, vz, wx, wy, wz]
    twist_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
