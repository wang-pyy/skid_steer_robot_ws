# Wheel odometry parameters.
#
# Encoder ticks are published by robot_driver (via serial from the Yahboom
# board) on /driver/motor_encoders (std_msgs/Int32MultiArray, 4 channels).
# This node subscribes to that topic and integrates differential-drive
# odometry — no GPIO access here.

odom_node:
  ros__parameters:
    # Topic that carries raw per-channel encoder ticks.
    encoder_topic: "/driver/motor_encoders"

    # Channel mapping (must match driver_params.yaml channel_{fl,fr,rl,rr}).
    # Board channels are 1-based; array index = channel - 1.
    channel_fl: 1
    channel_fr: 2
    channel_rl: 3
    channel_rr: 4

    # Per-wheel sign inversion if a wheel's tick count runs opposite to
    # its physical forward direction.
    invert_fl: false
    invert_fr: false
    invert_rl: false
    invert_rr: false

    # Encoder characteristics used to convert ticks → wheel radians.
    # ticks_per_wheel_rev = counts_per_rev * (4 if quadrature else 1) * gear_ratio
    counts_per_rev: 11        # PPR on the motor shaft
    gear_ratio: 30.0          # motor revs per wheel rev
    quadrature: true          # board decodes x4 edges per pulse

    # Robot geometry (must match driver_params.yaml)
    wheel_radius: 0.033
    track_width: 0.23

    # Odometry publish rate (Hz)
    odom_frequency: 50.0

    # Frame IDs
    odom_frame: "odom"
    base_frame: "base_link"

    # Pose covariance diagonal [x, y, z, roll, pitch, yaw]
    pose_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]

    # Twist covariance diagonal [vx, vy, vz, wx, wy, wz]
    twist_covariance_diagonal: [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
